<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Request a Pilot — OpenClaw Follow-up Concierge</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">OpenClaw Follow-up Concierge</div>
      <h1>Request a pilot</h1>
      <p class="lede">Tell us where follow-up is breaking right now. We’ll start with the narrowest useful workflow and prove value quickly.</p>
    </section>

    <section class="section alt">
      <form id="pilot-form" class="intake-form">
        <label>Name<input type="text" name="name" required></label>
        <label>Business<input type="text" name="business"></label>
        <label>Email<input type="email" name="email" required></label>
        <label>Website<input type="url" name="website"></label>
        <label>Best contact channel<input type="text" name="contact_channel" placeholder="Email, phone, DM, etc."></label>
        <label>Primary channel in scope
          <select name="primary_channel">
            <option value="email">Email</option>
            <option value="dms">DMs</option>
            <option value="mixed">Mixed</option>
            <option value="other">Other</option>
          </select>
        </label>
        <label>Biggest follow-up problem right now<textarea name="problem" rows="5" required></textarea></label>
        <label>What would a win look like in 14 days?<textarea name="win" rows="4"></textarea></label>
        <button class="button primary" type="submit">Request pilot</button>
        <p id="form-status" class="note"></p>
      </form>
    </section>
  </main>
  <script>
    const form = document.getElementById('pilot-form');
    const status = document.getElementById('form-status');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = 'Submitting…';
      const payload = Object.fromEntries(new FormData(form).entries());
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        status.textContent = data.error || 'Something went wrong. Please try again.';
        return;
      }
      window.location.href = '/thanks';
    });
  </script>
</body>
</html>
